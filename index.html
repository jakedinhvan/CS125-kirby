<!-- public/index.html -->
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Test</title>
    </head>
    <body>
        <h1> Search by Name </h1>

        <input id="input" placeholder="Type an anime name..." />
        <button onclick="send()"> Submit </button>

        <h1> Search by Genre </h1>

        <input id="genreinput" placeholder="Type a genre name..." />
        <button onclick="sendGenre()"> Submit </button>



        <pre id="output"></pre>

        <script>
            async function send() {
                const value = document.getElementById("input").value;
                const output = document.getElementById("output");

                output.textContent = "Loading...";

                try {
                    const res = await fetch(`/api/kirby/searchname`, {
                        method: "POST",
                        headers: {"Content-Type": "application/json "},
                        body: JSON.stringify({ query: value})
                    });
                    const data = await res.json();
                    output.textContent = JSON.stringify(data, null, 2);
                } catch (err) {
                    output.textContent = "Error";
                }
            }

            async function sendGenre() {
                const value = document.getElementById("genreinput").value;
                const output = document.getElementById("output");

                output.textContent = "Loading...";

                try {
                    const res = await fetch(`/api/kirby/searchgenre`, {
                        method: "POST",
                        headers: {"Content-Type": "application/json "},
                        body: JSON.stringify({ query: value})
                    });
                    const data = await res.json();
                    output.textContent = JSON.stringify(data, null, 2);
                } catch (err) {
                    output.textContent = "Error";
                }
            }

        </script>
</body>
</html>
